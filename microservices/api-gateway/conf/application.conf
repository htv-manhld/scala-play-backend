# API Gateway Configuration
play.application.secret=${?APPLICATION_SECRET}

# HTTP configuration
play.server.http.port=9000
play.server.http.address="0.0.0.0"

# Service URLs
services {
  user-service.url = ${?USER_SERVICE_URL:-"http://user-service:9001"}
  notification-service.url = ${?NOTIFICATION_SERVICE_URL:-"http://notification-service:9002"}
  analytics-service.url = ${?ANALYTICS_SERVICE_URL:-"http://analytics-service:9003"}
}

# Service discovery
consul {
  host = ${?CONSUL_HOST:-"consul"}
  port = ${?CONSUL_PORT:-"8500"}
}

# Redis for caching and session
redis.url = ${?REDIS_URL:-"redis://redis:6379"}

# Authentication
jwt {
  secret = ${?JWT_SECRET:-"your-jwt-secret-key"}
  expiration = ${?JWT_EXPIRATION:-"3600"}
}

# Rate limiting
rateLimit {
  requestsPerMinute = ${?RATE_LIMIT_REQUESTS_PER_MINUTE:-"100"}
  burstSize = ${?RATE_LIMIT_BURST_SIZE:-"20"}
}

# Health check
healthcheck.enabled = true

# CORS configuration
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type", "X-Requested-With", "Origin", "X-Correlation-ID"]
  allowCredentials = true
  preflightMaxAge = 3 days
}