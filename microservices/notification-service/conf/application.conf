# Notification Service Configuration
play.application.secret=${?APPLICATION_SECRET}

# HTTP configuration
play.server.http.port=9002
play.server.http.address="0.0.0.0"

# Kafka configuration
kafka.bootstrap.servers=${?KAFKA_BOOTSTRAP_SERVERS:-"kafka:9092"}
kafka.topics {
  user.events = "user-domain-events"
  notification.events = "notification-events"
}

# Email configuration
email {
  smtp {
    host = ${?SMTP_HOST:-"smtp.gmail.com"}
    port = ${?SMTP_PORT:-"587"}
    username = ${?SMTP_USERNAME}
    password = ${?SMTP_PASSWORD}
    ssl = true
    tls = true
  }
  from = ${?EMAIL_FROM:-"noreply@example.com"}
}

# Service discovery
consul {
  host = ${?CONSUL_HOST:-"consul"}
  port = ${?CONSUL_PORT:-"8500"}
}

# Service info
service {
  name = "notification-service"
  version = "1.0.0"
  host = ${?SERVICE_HOST:-"localhost"}
  port = ${?SERVICE_PORT:-"9002"}
}

# Health check
healthcheck.enabled = true

# CORS configuration
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type", "X-Requested-With", "X-Correlation-ID"]
  allowCredentials = true
  preflightMaxAge = 3 days
}