# Analytics Service Configuration
play.application.secret=${?APPLICATION_SECRET}

# HTTP configuration
play.server.http.port=9003
play.server.http.address="0.0.0.0"

# Database configuration
db.default.driver=org.postgresql.Driver
db.default.url=${?DB_DEFAULT_URL}
db.default.username=${?DB_DEFAULT_USERNAME}
db.default.password=${?DB_DEFAULT_PASSWORD}

# Slick configuration
slick.dbs.default.profile="slick.jdbc.PostgresProfile$"
slick.dbs.default.db.driver="org.postgresql.Driver"
slick.dbs.default.db.url=${?DB_DEFAULT_URL}
slick.dbs.default.db.user=${?DB_DEFAULT_USERNAME}
slick.dbs.default.db.password=${?DB_DEFAULT_PASSWORD}
slick.dbs.default.db.numThreads=5
slick.dbs.default.db.maxConnections=5

# Kafka configuration
kafka.bootstrap.servers=${?KAFKA_BOOTSTRAP_SERVERS:-"kafka:9092"}
kafka.topics {
  user.events = "user-domain-events"
  analytics.events = "analytics-events"
}

# InfluxDB for time series data
influxdb {
  url = ${?INFLUXDB_URL:-"http://influxdb:8086"}
  token = ${?INFLUXDB_TOKEN}
  org = ${?INFLUXDB_ORG:-"analytics"}
  bucket = ${?INFLUXDB_BUCKET:-"metrics"}
}

# Service discovery
consul {
  host = ${?CONSUL_HOST:-"consul"}
  port = ${?CONSUL_PORT:-"8500"}
}

# Service info
service {
  name = "analytics-service"
  version = "1.0.0"
  host = ${?SERVICE_HOST:-"localhost"}
  port = ${?SERVICE_PORT:-"9003"}
}

# Health check
healthcheck.enabled = true

# CORS configuration
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type", "X-Requested-With", "X-Correlation-ID"]
  allowCredentials = true
  preflightMaxAge = 3 days
}