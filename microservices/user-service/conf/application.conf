# User Service Configuration
play.application.secret=${?APPLICATION_SECRET}

# HTTP configuration
play.server.http.port=9001
play.server.http.address="0.0.0.0"

# Database configuration
db.default.driver=org.postgresql.Driver
db.default.url=${?DB_DEFAULT_URL}
db.default.username=${?DB_DEFAULT_USERNAME}
db.default.password=${?DB_DEFAULT_PASSWORD}

# Slick configuration
slick.dbs.default.profile="slick.jdbc.PostgresProfile$"
slick.dbs.default.db.driver="org.postgresql.Driver"
slick.dbs.default.db.url=${?DB_DEFAULT_URL}
slick.dbs.default.db.user=${?DB_DEFAULT_USERNAME}
slick.dbs.default.db.password=${?DB_DEFAULT_PASSWORD}
slick.dbs.default.db.numThreads=10
slick.dbs.default.db.maxConnections=10

# Kafka configuration
kafka.bootstrap.servers=${?KAFKA_BOOTSTRAP_SERVERS:-"kafka:9092"}
kafka.topic.user.events="user-domain-events"

# Service discovery
service.name="user-service"
service.version="1.0.0"
service.host=${?SERVICE_HOST:-"localhost"}
service.port=${?SERVICE_PORT:-"9001"}

# Dependency injection modules
play.modules.enabled += "modules.UserServiceModule"

# Health check
healthcheck.enabled=true

# CORS configuration
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type", "X-Requested-With", "Origin"]
  allowCredentials = true
  preflightMaxAge = 3 days
}